<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caribbean Streams</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f0f0f;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background-color: #141414;
      position: sticky;
      top: 0;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: red;
    }

    .nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .hero {
      height: 60vh;
      background: url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') center/cover;
      display: flex;
      align-items: center;
      padding: 40px;
    }

    .hero h1 {
      font-size: 48px;
      max-width: 500px;
    }

    .section {
      padding: 20px 30px;
    }

    .row {
      display: flex;
      overflow-x: auto;
      gap: 10px;
    }

    .card {
      min-width: 180px;
      height: 250px;
      background-color: #222;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #141414;
      margin-top: 20px;
    }

    .settings {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: #222;
      padding: 10px;
      border-radius: 10px;
    }

    .btn {
      padding: 8px 12px;
      background: red;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Caribbean Streams</div>
  <div class="nav">
    <a href="#">Home</a>
    <a href="#movies">Movies</a>
    <a href="#tv">TV Shows</a>
  </div>
</header>

<section class="hero">
  <div>
    <h1>Watch Movies & TV Shows Anytime</h1>
    <button class="btn">Start Watching</button>
  </div>
</section>

<section class="section" id="movies">
  <h2>Popular Movies</h2>
  <div class="row">
    <div class="card"><img src="https://source.unsplash.com/200x300/?movie" /></div>
    <div class="card"><img src="https://source.unsplash.com/201x300/?film" /></div>
    <div class="card"><img src="https://source.unsplash.com/202x300/?cinema" /></div>
    <div class="card"><img src="https://source.unsplash.com/203x300/?action-movie" /></div>
  </div>
</section>

<section class="section" id="tv">
  <h2>Popular TV Shows</h2>
  <div class="row">
    <div class="card"><img src="https://source.unsplash.com/204x300/?tv" /></div>
    <div class="card"><img src="https://source.unsplash.com/205x300/?series" /></div>
    <div class="card"><img src="https://source.unsplash.com/206x300/?show" /></div>
    <div class="card"><img src="https://source.unsplash.com/207x300/?netflix" /></div>
  </div>
</section>

<div class="settings">
  <button class="btn" onclick="toggleSettings()">Settings</button>
  <div id="panel" style="display:none; margin-top:10px;">
    <p>Dark Mode: ON</p>
    <p>Profile: Guest</p>
  </div>
</div>

<footer>
  <p>© 2026 Caribbean Streams. All rights reserved.</p>
</footer>

<script>
function toggleSettings() {
  const panel = document.getElementById('panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}
</script>

</body>
</html>
